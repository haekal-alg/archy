  <circle cx="22" cy="26" r="11" fill="#6b96ff" opacity="0.35" />
  <circle cx="36" cy="28" r="8" fill="#6b96ff" opacity="0.35" />
  <rect x="11" y="28" width="33" height="12" rx="6" fill="#6b96ff" opacity="0.35" />
  <!-- Main cloud body -->
  <circle cx="20" cy="24" r="11" fill="#6b96ff" />
  <circle cx="34" cy="22" r="9" fill="#6b96ff" />
  <circle cx="42" cy="28" r="7" fill="#6b96ff" />
  <circle cx="12" cy="30" r="6" fill="#6b96ff" />
  <rect x="6" y="28" width="43" height="12" rx="6" fill="#6b96ff" />
