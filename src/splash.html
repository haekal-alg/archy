<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Archy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0f0f14 0%, #1a1a24 50%, #0f0f14 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
      transition: opacity 0.4s ease;
    }

    body.fade-out {
      opacity: 0;
    }

    /* Ambient background animation */
    .ambient {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      animation: ambientPulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    .ambient::after {
      content: '';
      position: absolute;
      top: -50px;
      left: -50px;
      right: -50px;
      bottom: -50px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
      animation: ambientPulse 4s ease-in-out infinite 2s;
    }

    @keyframes ambientPulse {
      0%, 100% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    /* Self-drawing network icon */
    .network-icon {
      width: 64px;
      height: 64px;
      opacity: 0;
      animation: fadeIn 0.4s ease-out 0.1s forwards;
    }

    .network-icon .edge {
      stroke: #6366f1;
      stroke-width: 1.5;
      fill: none;
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: drawEdge 0.8s ease-out 0.3s forwards;
    }

    .network-icon .node-circle {
      fill: #1a1a24;
      stroke: #8b5cf6;
      stroke-width: 1.5;
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: drawEdge 0.6s ease-out 0.6s forwards;
    }

    .network-icon .node-dot {
      fill: #a78bfa;
      opacity: 0;
      animation: nodePop 0.3s ease-out 1s forwards;
    }

    @keyframes drawEdge {
      to { stroke-dashoffset: 0; }
    }

    @keyframes nodePop {
      0% { opacity: 0; transform: scale(0); }
      100% { opacity: 1; transform: scale(1); }
    }

    .logo {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -1px;
      color: #fff;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.2s forwards;
    }

    .logo span {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Indeterminate progress bar */
    .progress-bar {
      width: 180px;
      height: 2px;
      background: rgba(99, 102, 241, 0.15);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.4s forwards;
    }

    .progress-bar-fill {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #6366f1, #8b5cf6, transparent);
      border-radius: 2px;
      animation: progressSlide 1.5s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.5);
    }

    @keyframes progressSlide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .quote-container {
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.6s forwards;
      position: relative;
    }

    .quote {
      font-size: 13px;
      color: #64748b;
      font-style: italic;
      text-align: center;
      position: absolute;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .quote.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .quote.exiting {
      opacity: 0;
      transform: translateY(-4px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="ambient"></div>
  <div class="container">
    <!-- Self-drawing network topology icon -->
    <svg class="network-icon" viewBox="0 0 64 64" fill="none">
      <!-- Edges (lines between nodes) -->
      <line class="edge" x1="32" y1="12" x2="12" y2="42" />
      <line class="edge" x1="32" y1="12" x2="52" y2="42" style="animation-delay: 0.4s" />
      <line class="edge" x1="12" y1="42" x2="52" y2="42" style="animation-delay: 0.5s" />
      <line class="edge" x1="32" y1="12" x2="32" y2="52" style="animation-delay: 0.55s" />
      <!-- Node rings -->
      <circle class="node-circle" cx="32" cy="12" r="5" />
      <circle class="node-circle" cx="12" cy="42" r="5" style="animation-delay: 0.7s" />
      <circle class="node-circle" cx="52" cy="42" r="5" style="animation-delay: 0.8s" />
      <circle class="node-circle" cx="32" cy="52" r="4" style="animation-delay: 0.85s" />
      <!-- Node center dots -->
      <circle class="node-dot" cx="32" cy="12" r="2" />
      <circle class="node-dot" cx="12" cy="42" r="2" style="animation-delay: 1.1s" />
      <circle class="node-dot" cx="52" cy="42" r="2" style="animation-delay: 1.2s" />
      <circle class="node-dot" cx="32" cy="52" r="1.5" style="animation-delay: 1.25s" />
    </svg>

    <div class="logo"><span>Archy</span></div>

    <div class="progress-bar">
      <div class="progress-bar-fill"></div>
    </div>

    <div class="quote-container">
      <div class="quote" id="quote"></div>
      <div class="quote" id="quote2"></div>
    </div>
  </div>

  <script>
    const quotes = [
      "Enumerating all possible states\u2026",
      "Normalizing the universe to 3NF.",
      "Solving P vs NP (ETA: soon\u2122).",
      "Inlining reality for performance.",
      "Garbage collecting unused dimensions.",
      "Waiting for cache coherence.",
      "Recompiling the laws of physics.",
      "Resolving circular dependencies in spacetime.",
      "Reducing entropy (temporarily).",
      "Indexing the multiverse.",
      "Synchronizing atomic clocks\u2026 emotionally.",
      "Rebalancing floating-point errors.",
      "Checking if infinity fits in a 64-bit integer.",
      "Vectorizing the timeline.",
      "Rewriting history with better variable names."
    ];

    // Shuffle quotes
    const shuffled = quotes.sort(() => Math.random() - 0.5);
    let currentIndex = 0;

    const quoteEl = document.getElementById('quote');
    const quoteEl2 = document.getElementById('quote2');
    let activeEl = quoteEl;
    let inactiveEl = quoteEl2;

    function showQuote() {
      // Start exiting old quote
      activeEl.classList.remove('visible');
      activeEl.classList.add('exiting');

      // Swap active/inactive
      const temp = activeEl;
      activeEl = inactiveEl;
      inactiveEl = temp;

      // Set new text on incoming element
      activeEl.textContent = shuffled[currentIndex];
      activeEl.classList.remove('exiting');

      // Brief overlap: show new quote while old is still fading
      setTimeout(() => {
        activeEl.classList.add('visible');
        inactiveEl.classList.remove('exiting');
      }, 150);

      currentIndex = (currentIndex + 1) % shuffled.length;
    }

    // Initial quote after a short delay
    setTimeout(showQuote, 800);

    // Rotate quotes every 2.5 seconds
    setInterval(showQuote, 2500);
  </script>
</body>
</html>
